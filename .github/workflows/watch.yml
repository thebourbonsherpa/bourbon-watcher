name: bourbon-watch

on:
  schedule:
    # every 15 minutes (GitHub may delay during peak load; that's normal)
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to commit state.json back

concurrency:
  group: bourbon-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bourbon_watch.py

      - name: Persist state
        run: |
          # state.json is regenerated every run, so a push race is harmless:
          # re-sync to the remote tip, re-apply this run's state, and retry.
          # If it still can't push, exit clean - the next run re-persists. This
          # keeps a transient "fetch first" rejection from failing the job.
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state change; nothing to persist."
            exit 0
          fi
          git config user.name "bourbon-watch"
          git config user.email "actions@users.noreply.github.com"
          cp state.json /tmp/state.json
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME:-main}"
            git reset --hard "origin/${GITHUB_REF_NAME:-main}"
            cp /tmp/state.json state.json
            if [[ -z "$(git status --porcelain state.json)" ]]; then
              echo "Remote already has this state; nothing to push."
              exit 0
            fi
            git add state.json
            git commit -m "update state [skip ci]"
            if git push; then
              echo "State pushed on attempt $attempt."
              exit 0
            fi
            echo "Push race on attempt $attempt; re-syncing and retrying."
            sleep $((RANDOM % 5 + 2))
          done
          echo "Could not push state after retries; next run will re-persist."
          exit 0
